# OTel Collector fronting the Victoria stack (observability profile).
# Apps send OTLP here (gRPC :4317 / HTTP :4318); the collector fans out to
# VictoriaMetrics, VictoriaLogs, and VictoriaTraces over their native OTLP
# ingest endpoints.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlphttp/victoriametrics:
    compression: gzip
    metrics_endpoint: http://victoriametrics:8428/opentelemetry/v1/metrics
  otlphttp/victorialogs:
    compression: gzip
    logs_endpoint: http://victorialogs:9428/insert/opentelemetry/v1/logs
  otlphttp/victoriatraces:
    compression: gzip
    traces_endpoint: http://victoriatraces:10428/insert/opentelemetry/v1/traces

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victoriametrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victorialogs]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victoriatraces]
