apiVersion: 1

datasources:
  - name: VictoriaMetrics
    uid: victoriametrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true

  # Requires the victoriametrics-logs-datasource plugin
  # (installed via GF_INSTALL_PLUGINS in compose).
  - name: VictoriaLogs
    uid: victorialogs
    type: victoriametrics-logs-datasource
    access: proxy
    url: http://victorialogs:9428

  # VictoriaTraces exposes a Jaeger-compatible query API.
  - name: VictoriaTraces
    uid: victoriatraces
    type: jaeger
    access: proxy
    url: http://victoriatraces:10428/select/jaeger
