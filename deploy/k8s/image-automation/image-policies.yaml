---
# CI tags main-<run_number>-<shortsha>; the numerical policy on the
# extracted run number picks the newest build.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: cvgen-gateway
spec:
  imageRepositoryRef:
    name: cvgen-gateway
  filterTags:
    pattern: '^main-(?P<run>[0-9]+)-[0-9a-f]+$'
    extract: '$run'
  policy:
    numerical:
      order: asc
