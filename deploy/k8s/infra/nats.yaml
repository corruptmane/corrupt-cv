---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nats
  namespace: cvgen
spec:
  interval: 1h
  chart:
    spec:
      chart: nats
      version: "2.14.2"
      sourceRef:
        kind: HelmRepository
        name: nats
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    config:
      jetstream:
        enabled: true
        fileStore:
          pvc:
            enabled: true
            size: 5Gi
            storageClassName: longhorn
