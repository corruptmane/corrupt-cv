---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger-loadtester
  namespace: cvgen
spec:
  interval: 1h
  chart:
    spec:
      chart: loadtester
      version: "0.37.0"
      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
