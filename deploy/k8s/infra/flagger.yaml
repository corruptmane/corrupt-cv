---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flagger-system
spec:
  interval: 1h
  chart:
    spec:
      chart: flagger
      version: "1.44.0"
      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    meshProvider: "gatewayapi:v1"
    # VictoriaMetrics' prometheus-compatible query API.
    metricsServer: "http://vmsingle-victoria-metrics-victoria-metrics-k8s-stack.monitoring.svc:8428"
    prometheus:
      install: false
