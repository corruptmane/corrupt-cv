---
# tofu -> SSM -> ESO -> Secret chain (ADR 0013): infra/opentofu writes these
# parameters; the secret keys are named exactly like the env vars so the
# Deployments consume them via envFrom.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cvgen-aws
  namespace: cvgen
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: cvgen-aws
    creationPolicy: Owner
  data:
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: /homelab/cvgen-s3-endpoint
    - secretKey: S3_REGION
      remoteRef:
        key: /homelab/cvgen-s3-region
    - secretKey: S3_BUCKET
      remoteRef:
        key: /homelab/cvgen-s3-bucket
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: /homelab/cvgen-s3-access-key-id
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: /homelab/cvgen-s3-secret-access-key
    - secretKey: SESSION_SECRET
      remoteRef:
        key: /homelab/cvgen-session-secret
