---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-processor
  namespace: cvgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-processor
  template:
    metadata:
      labels:
        app: ai-processor
    spec:
      containers:
        - name: ai-processor
          image: ghcr.io/corruptmane/cvgen-ai-processor
          ports:
            - name: ops
              containerPort: 9090
          env:
            - name: NATS_URL
              value: nats://nats.cvgen.svc:4222
            - name: VALKEY_URL
              value: valkey://valkey.cvgen.svc:6379
            - name: OPS_PORT
              value: "9090"
            - name: LOG_LEVEL
              value: INFO
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector.monitoring.svc:4318
            - name: OTEL_SERVICE_NAME
              value: ai-processor
          livenessProbe:
            httpGet:
              path: /healthz
              port: ops
          readinessProbe:
            httpGet:
              path: /readyz
              port: ops
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
