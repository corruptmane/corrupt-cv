---
# Both templates read otelgin's http.server.request.duration histogram from
# VictoriaMetrics (Prometheus naming enabled server-side). Canary pods are
# isolated from the primary via the instance label, which the gateway
# Deployment populates with the pod name (service.instance.id).
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: gateway-success-rate
  namespace: cvgen
spec:
  provider:
    type: prometheus
    address: http://vmsingle-victoria-metrics-victoria-metrics-k8s-stack.monitoring.svc:8428
  query: |
    100 * sum(rate(http_server_request_duration_seconds_count{job="gateway",instance=~"{{ target }}-.*",instance!~"{{ target }}-primary-.*",http_response_status_code!~"5.."}[{{ interval }}]))
    /
    sum(rate(http_server_request_duration_seconds_count{job="gateway",instance=~"{{ target }}-.*",instance!~"{{ target }}-primary-.*"}[{{ interval }}]))
---
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: gateway-latency
  namespace: cvgen
spec:
  provider:
    type: prometheus
    address: http://vmsingle-victoria-metrics-victoria-metrics-k8s-stack.monitoring.svc:8428
  query: |
    histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{job="gateway",instance=~"{{ target }}-.*",instance!~"{{ target }}-primary-.*"}[{{ interval }}])))
