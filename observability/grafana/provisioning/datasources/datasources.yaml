apiVersion: 1

datasources:
  # Metrics: VictoriaMetrics is Prometheus-API compatible.
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    jsonData:
      httpMethod: POST

  # Logs: VictoriaLogs datasource plugin (installed via GF_INSTALL_PLUGINS).
  - name: VictoriaLogs
    type: victoriametrics-logs-datasource
    access: proxy
    url: http://victorialogs:9428

  # Traces: VictoriaTraces exposes a Jaeger-compatible query API.
  # NOTE: confirm the query base path against your VictoriaTraces build.
  - name: VictoriaTraces
    type: jaeger
    access: proxy
    url: http://victoriatraces:10428/select/jaeger
