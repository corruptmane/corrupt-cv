# VictoriaMetrics pull config: scrape /metrics off each service's ops port.
# The gateway exposes an OTel Prometheus exporter; the Python workers expose one
# via the ops server (cv_worker.ops).
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:9090"]
  - job_name: ai-processor
    static_configs:
      - targets: ["ai-processor:8081"]
  - job_name: cv-generator
    static_configs:
      - targets: ["cv-generator:8082"]
