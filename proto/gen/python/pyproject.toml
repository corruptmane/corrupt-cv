[project]
name = "cv-contracts"
version = "0.1.0"
description = "Generated protobuf contracts (cv.v1) shared by the Python services."
requires-python = ">=3.13,<3.14"
dependencies = ["protobuf>=6.31,<7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cv"]
