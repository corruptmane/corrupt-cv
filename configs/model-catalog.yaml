# Seed data for the "model-catalog" NATS KV bucket.
#
# The gateway loads this file at boot and upserts every entry into the
# bucket. The UI only offers these keys, and ai-processor rejects any
# key not present in the bucket — raw model ids are never accepted from
# user input. Edit this file and restart the gateway to change the
# catalog.
models:
  - key: fake/canned-cv
    provider: FAKE
    model_id: canned-cv
    display_name: Fake (canned CV)
    description: Returns a fixed example CV without calling any provider. No API key required.
  - key: anthropic/claude-opus-4-8
    provider: ANTHROPIC
    model_id: claude-opus-4-8
    display_name: Claude Opus 4.8
  - key: anthropic/claude-sonnet-4-5
    provider: ANTHROPIC
    model_id: claude-sonnet-4-5
    display_name: Claude Sonnet 4.5
  - key: anthropic/claude-haiku-4-5
    provider: ANTHROPIC
    model_id: claude-haiku-4-5
    display_name: Claude Haiku 4.5
  - key: openai/gpt-5.1
    provider: OPENAI
    model_id: gpt-5.1
    display_name: GPT-5.1
  - key: openai/gpt-5.1-mini
    provider: OPENAI
    model_id: gpt-5.1-mini
    display_name: GPT-5.1 mini
  - key: google/gemini-2.5-pro
    provider: GOOGLE
    model_id: gemini-2.5-pro
    display_name: Gemini 2.5 Pro
  - key: google/gemini-2.5-flash
    provider: GOOGLE
    model_id: gemini-2.5-flash
    display_name: Gemini 2.5 Flash
