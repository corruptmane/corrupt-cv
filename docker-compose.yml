# Local vertical-slice stack. `just up` builds and starts everything.
# Backends (Victoria*, OTel) are best-effort telemetry sinks; the core pipeline
# (gateway -> nats -> ai-processor -> cv-generator -> s3) works without them.
name: cv

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.version=0.1.0
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ---------------- infrastructure ----------------
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cv
      POSTGRES_PASSWORD: cv
      POSTGRES_DB: cv
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cv -d cv"]
      interval: 3s
      timeout: 3s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports: ["4222:4222", "8222:8222"]
    volumes: ["natsdata:/data"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8222/healthz || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
      DEBUG: 0
    ports: ["4566:4566"]
    volumes:
      - "./scripts/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh:ro"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4566/_localstack/health | grep -q '\"s3\": \"available\"\\|\"s3\": \"running\"'"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------------- observability (Victoria stack + OTel + Vector) ----------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - "./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro"
    ports: ["4317:4317", "4318:4318"]
    depends_on: [victoriametrics, victoriatraces]

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.111.0
    command:
      - "--retentionPeriod=1d"
      - "--selfScrapeInterval=10s"
      - "--promscrape.config=/etc/vm/scrape.yml"
    ports: ["8428:8428"]
    volumes:
      - "vmdata:/victoria-metrics-data"
      - "./observability/victoriametrics-scrape.yml:/etc/vm/scrape.yml:ro"

  victorialogs:
    image: victoriametrics/victoria-logs:v1.3.2-victorialogs
    command: ["--retentionPeriod=1d"]
    ports: ["9428:9428"]
    volumes: ["vldata:/victoria-logs-data"]

  victoriatraces:
    # VictoriaTraces single-node. Ingests OTLP; exposes a Jaeger-compatible query API.
    # NOTE: confirm image tag + OTLP ingest path against your homelab build when the stack is up.
    image: victoriametrics/victoria-traces:latest
    command: ["--retentionPeriod=1d"]
    ports: ["10428:10428"]
    volumes: ["vtdata:/victoria-traces-data"]

  vector:
    image: timberio/vector:0.43.1-debian
    volumes:
      - "./observability/vector.yaml:/etc/vector/vector.yaml:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    depends_on: [victorialogs]

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    ports: ["3000:3000"]
    volumes:
      - "./observability/grafana/provisioning:/etc/grafana/provisioning:ro"
    depends_on: [victoriametrics, victorialogs, victoriatraces]

  # ---------------- application services ----------------
  # One-shot DB migrations (same image as the gateway, /migrate entrypoint).
  migrate:
    image: cv-gateway:dev
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    entrypoint: ["/migrate"]
    environment:
      POSTGRES_DSN: postgres://cv:cv@postgres:5432/cv?sslmode=disable
    restart: "no"
    depends_on:
      postgres: {condition: service_healthy}

  gateway:
    image: cv-gateway:dev
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: gateway
      GATEWAY_HTTP_ADDR: ":8080"
      GATEWAY_OPS_ADDR: ":9090"
      MODELS_CONFIG_PATH: /config/models.yaml
      NATS_URL: nats://nats:4222
      NATS_STREAM: CV
      POSTGRES_DSN: postgres://cv:cv@postgres:5432/cv?sslmode=disable
      VALKEY_URL: redis://valkey:6379/0
      S3_ENDPOINT: http://localstack:4566
      S3_REGION: us-east-1
      S3_BUCKET: cv-pdfs
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_USE_PATH_STYLE: "true"
      SECRET_TTL_SECONDS: "300"
    volumes:
      - "./config/models.yaml:/config/models.yaml:ro"
    ports: ["8080:8080", "9090:9090"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      valkey: {condition: service_healthy}
      nats: {condition: service_healthy}
      localstack: {condition: service_healthy}

  ai-processor:
    image: cv-ai-processor:dev
    build:
      context: .
      dockerfile: services/ai-processor/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: ai-processor
      HEALTH_ADDR: ":8081"
      NATS_URL: nats://nats:4222
      NATS_STREAM: CV
      VALKEY_URL: redis://valkey:6379/0
      SECRET_TTL_SECONDS: "300"
    ports: ["8081:8081"]
    depends_on:
      valkey: {condition: service_healthy}
      nats: {condition: service_healthy}

  cv-generator:
    image: cv-cv-generator:dev
    build:
      context: .
      dockerfile: services/cv-generator/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: cv-generator
      HEALTH_ADDR: ":8082"
      NATS_URL: nats://nats:4222
      NATS_STREAM: CV
      S3_ENDPOINT: http://localstack:4566
      S3_REGION: us-east-1
      S3_BUCKET: cv-pdfs
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_USE_PATH_STYLE: "true"
    ports: ["8082:8082"]
    depends_on:
      nats: {condition: service_healthy}
      localstack: {condition: service_healthy}

volumes:
  pgdata:
  natsdata:
  vmdata:
  vldata:
  vtdata:
