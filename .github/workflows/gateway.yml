name: gateway
on:
  pull_request:
    paths: ["services/gateway/**", "proto/gen/go/**", "proto/**", "go.work"]
  push:
    branches: [main]
    paths: ["services/gateway/**", "proto/gen/go/**", "proto/**", "go.work"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/gateway/go.sum
      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.27.0"
      - name: sqlc generated code is up to date
        run: sqlc generate && git diff --exit-code
      - run: go build ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/gateway
          version: latest
      - run: go test ./...
