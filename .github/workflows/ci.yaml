name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      k8s: ${{ steps.filter.outputs.k8s }}
      images: ${{ steps.filter.outputs.images }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'
            go:
              - 'services/gateway/**'
              - 'proto/**'
            python:
              - 'libs/python/**'
              - 'services/ai-processor/**'
              - 'services/cv-generator/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'proto/**'
            k8s:
              - 'deploy/k8s/**'
            # Anything that changes what ships inside an image. Bot commits
            # from Flux image automation touch only deploy/k8s, so they must
            # NOT trigger image builds — new builds mint new sortable tags,
            # which the automation would commit again, forever.
            images:
              - 'services/**'
              - 'libs/**'
              - 'proto/**'
              - 'migrations/**'
              - 'configs/**'
              - 'deploy/compose/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'scripts/**'
              - '.github/workflows/ci.yaml'

  proto:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          format: false
          push: false
          breaking: ${{ github.event_name == 'pull_request' }}
          breaking_against: https://github.com/${{ github.repository }}.git#branch=main
      - name: Check committed codegen is up to date
        run: |
          buf generate
          git diff --exit-code

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/gateway/go.mod
          cache-dependency-path: services/gateway/go.sum
      - uses: golangci/golangci-lint-action@v8
        with:
          working-directory: services/gateway
      - run: go build ./...
      - run: go test ./...

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check
      - run: uv run pytest

  docker:
    needs: changes
    if: needs.changes.outputs.images == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: gateway
            dockerfile: services/gateway/Dockerfile
          - image: ai-processor
            dockerfile: services/ai-processor/Dockerfile
          - image: cv-generator
            dockerfile: services/cv-generator/Dockerfile
          - image: migrate
            dockerfile: deploy/compose/Dockerfile.migrate
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Sortable tag for Flux image automation: numerical ImagePolicy extracts
      # the run number. (Caveat: run_number resets if the workflow file is
      # renamed — accepted.)
      - id: tag
        run: echo "sortable=main-${{ github.run_number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/corruptmane/cvgen-${{ matrix.image }}:latest
            ghcr.io/corruptmane/cvgen-${{ matrix.image }}:${{ github.sha }}
            ghcr.io/corruptmane/cvgen-${{ matrix.image }}:${{ steps.tag.outputs.sortable }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  k8s-validate:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # kustomize is preinstalled on ubuntu runners; only kubeconform is needed.
      - name: Install kubeconform
        run: curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz | sudo tar -xz -C /usr/local/bin kubeconform
      - name: Validate manifests
        run: |
          set -euo pipefail
          for dir in deploy/k8s/*/; do
            echo "==> $dir"
            kustomize build "$dir" | kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          done

  e2e:
    needs: changes
    if: needs.changes.outputs.images == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Start the stack
        run: docker compose -f deploy/compose/compose.yaml up -d --build
      - name: Wait for gateway
        run: |
          for _ in $(seq 1 60); do
            curl -fsS -o /dev/null http://localhost:8080/ && exit 0
            sleep 2
          done
          echo "gateway never came up" >&2
          exit 1
      - name: Run e2e
        run: bash scripts/e2e.sh
      - name: Dump compose logs
        if: failure()
        run: docker compose -f deploy/compose/compose.yaml logs --timestamps
      - name: Tear down
        if: always()
        run: docker compose -f deploy/compose/compose.yaml down -v
