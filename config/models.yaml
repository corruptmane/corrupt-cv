# Provider -> selectable models. Edit + restart the gateway to change the menu;
# no code change needed. The gateway validates submitted (provider, model) pairs
# against this file. `test` is the keyless deterministic provider.
providers:
  test:
    - id: deterministic
      label: Deterministic (no model call)
      default: true
  openai:
    - id: gpt-4o-mini
      label: GPT-4o mini
      default: true
    - id: gpt-4o
      label: GPT-4o
    - id: o4-mini
      label: o4-mini
  anthropic:
    - id: claude-haiku-4-5-20251001
      label: Claude Haiku 4.5
      default: true
    - id: claude-sonnet-4-6
      label: Claude Sonnet 4.6
    - id: claude-opus-4-8
      label: Claude Opus 4.8
  gemini:
    - id: gemini-2.0-flash
      label: Gemini 2.0 Flash
      default: true
    - id: gemini-2.5-pro
      label: Gemini 2.5 Pro
  ollama:
    - id: llama3.2
      label: Llama 3.2
      default: true
    - id: qwen2.5
      label: Qwen 2.5
